name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/core/package-lock.json

      - name: Install dependencies
        working-directory: packages/core
        run: npm ci

      - name: Typecheck
        working-directory: packages/core
        run: npm run check

      - name: Test
        working-directory: packages/core
        run: npm test