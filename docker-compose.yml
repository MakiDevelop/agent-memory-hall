# Agent Memory Hall — Multi-Agent Setup (Docker + Postgres)
#
# Usage:
#   docker compose up -d
#
# Then point your MCP clients to the AMH server:
#   npx @chibakuma/agent-memory-hall --store postgres --path postgres://amh:amh@localhost:5432/amh
#
# Or configure each agent's MCP config:
#   {
#     "mcpServers": {
#       "agent-memory-hall": {
#         "command": "npx",
#         "args": ["@chibakuma/agent-memory-hall", "--store", "postgres", "--path", "postgres://amh:amh@localhost:5432/amh"]
#       }
#     }
#   }

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: amh
      POSTGRES_USER: amh
      POSTGRES_PASSWORD: amh
    volumes:
      - amh-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amh"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  amh-data:
